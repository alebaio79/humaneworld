<div id="en__upsellModal" class="en__upsellModal__zoomin image-left en__upsellModal__ready">
  <div class="en__upsellModal__container en__upsellModal__withanim">
    <!-- ideal image size is 480x650 pixels -->
    <div class="en__upsellModal__background"
      style="background-image: url('https://aaf1a18515da0e792f78-c27fdabe952dfc357fe25ebf5c8897ee.ssl.cf5.rackcdn.com/2253/monthly-modal-desktop.jpg?v=1615495953000');">
    </div>

    <div class="en__upsellModal__content">
      <span id="en__upsellModal__close"></span>

      <h2>Thank you! Before we process your donation, will you start a 5 USD monthly gift instead?</h2>

      <p>Every dollar you’re able to give makes a tremendous difference, and monthly donations are critical for us to make a lasting impact.
      </p>


      <div id="en__upsellModal__buttons">
        <!-- YES BUTTON -->
        <div id="en__upsellModal__yes">
          <button type="button">
            <span class="label">YES! Process my monthly gift of 5 USD</span>
          </button>
        </div>

        <!-- NO BUTTON -->
        <div id="en__upsellModal__no">
          <button title="Close (Esc)" type="button">
            <span class="label">Not today. Process my one-time gift of 10 USD</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
