                        },

        [[?//::Comment:: This code runs on form pages only, not on thank-you pages ::]]
            (function($) {
                $(document).ready(function() {
                    formProperties.id = "[[S120:dc:donFormId]]";
                    formProperties.name = "[[S120:dc:donationFormName]]";
                    formProperties.type = "";
                    
                    //See if we can fill in the formType.
                    //The formName should have the type in it.
                    if (formProperties.name !== "") {
                        if (formProperties.name.indexOf("onetime") > -1) {
                            formProperties.type = "onetime";                        
                        } else if (formProperties.name.indexOf("monthly") > -1) {
                            formProperties.type = "monthly";                        
                        }                  
                    }
                    
                              
                    //Fire Step 1 (Choose Donation Amount) if any donation amount is preselected
                    $('input[id*="level_standard"]').each(function() {
                       if ($(this).is(":checked")) {
                            if(hasChosenDonationAmount) return;
                           
                            dataLayer.push({
                                'event': 'checkout',
                                'ecommerce': {
                                    'checkout': {
                                        'actionField': {'step': 1},
                                        'products': [{
                                            'name': formProperties.id, // Name or ID is required.
                                            'id': '', // The ID of the product, must be consistent
                                            'category': formProperties.type,
                                            'quantity': 1
                                        }]
                                    }
                                }
                            });
                            hasChosenDonationAmount = true;
                            return false;
                       }                       
                    });
                                    
                    // Step 1 (Choose Donation Amount): trigger event for completion of step 1
                    $('input[id*="level_standard"], select[id*="level_standard"]').click(function() {            
                        if(hasChosenDonationAmount) return;
                                    
                        dataLayer.push({
                            'event': 'checkout',
                            'ecommerce': {
                                'checkout': {
                                    'actionField': {'step': 1},
                                    'products': [{
                                        'name': formProperties.id, // Name or ID is required.
                                        'id': '', // The ID of the product, must be consistent
                                        'category': formProperties.type,
                                        'quantity': 1
                                    }]
                                }
                            }
                        });
                        hasChosenDonationAmount = true;
                    });
                    
                    // Step 2 (Billing): trigger event for completion of step 2            
                    $('input[id*="billing"], select[id*="billing"]').click(function() {                
                        if(hasBillingFired) return;
                    
                        dataLayer.push({
                            'event': 'checkout',
                            'ecommerce': {
                                'checkout': {
                                    'actionField': {'step': 2},
                                    'products': [{
                                        'name': formProperties.id, // Name or ID is required.
                                        'id': '', // The ID of the product, must be consistent
                                        'category': formProperties.type,
                                        'quantity': 1
                                    }]
                                }
                            }
                        });
                        hasBillingFired = true;
                    });
                    
                    // Step 3 (Payment Type): trigger event for completion of step 3
                    $('input[id*="payment_type"], select[id*="payment_type"]').click(function() {                             
                        if(hasSelectedPaymentType) return;
                    
                        dataLayer.push({
                            'event': 'checkout',
                            'ecommerce': {
                                'checkout': {
                                    'actionField': {'step': 3},
                                    'products': [{
                                        'name': formProperties.id, // Name or ID is required.
                                        'id': '', // The ID of the product, must be consistent
                                        'category': formProperties.type,
                                        'quantity': 1
                                    }]
                                }
                            }
                        });
                        hasSelectedPaymentType = true;
                    });

                    var checkedInput = $('input[name=level_standardexpanded]:checked').next().html();

                    $('input[name=level_standardexpanded]').change(function() {
                        checkedInput = $('input[name=level_standardexpanded]:checked').next().html();
                    });

                    $('#level_standardauto_repeatname').prop('checked', true).click();

                    if($('#frequency-one-time').is(':checked')) {
                        //$('#level_standardauto_repeatname').prop('checked', false);
                        var frequencyType = 'frequency-one-time';
                    } else if($('#frequency-monthly').is(':checked')) {
                        //
                        var frequencyType = 'frequency-monthly';
                    }
                    

                    $('.new-button-style .radio-custom').change(function() {
                        if($('#frequency-one-time').is(':checked')) { console.log('one time is checked');
                            $('#level_standardauto_repeatname').prop('checked', false);
                            frequencyType = 'frequency-one-time';
                        } else if($('#frequency-monthly').is(':checked')) { console.log('monthly is checked');
                            $('#level_standardauto_repeatname').prop('checked', true);
                            frequencyType = 'frequency-monthly';
                        }
                    });
                    

                    // Step 4 (Form Submission): trigger event for completion of step 4
                    $('#pstep_finish, button.donate-submit').click(function(e) {


                        var form = $( "#ProcessForm" );

                        if(form.valid() == true) {
                            console.log(form.valid());
                            dataLayer.push({
                                'event': 'formSubmit',
                                'donationType': frequencyType, //radio id: frequency-monthly or frequency-one-time
                                'donationAmount': checkedInput //donation amount selected from span
                            });
                        } else {
                            console.log('not valid');
                            console.log(frequencyType);
                            console.log(checkedInput);
                        }

                        var monthlyPromoAmount = $('#monthly-modal-promo-amount').val();

                        $('#monthly-modal-yes').click(function(){
                          console.log('monthly is cool');
                          dataLayer.push({
                              'event': 'buttonClick',
                              'donationType': 'frequency-monthly', //radio id: frequency-monthly or frequency-one-time
                              'buttonType': 'monthly-modal-yes', //button id: monthly-modal-yes or monthly-modal-no
                              'updatedAmount': '$'+Math.round(monthlyPromoAmount) //donation amount selected from monthly-modal-amount
                          });
                        });

                        $('#monthly-modal-no').click(function() {
                          console.log('one time is cool');
                          dataLayer.push({
                              'event': 'buttonClick',
                              'donationType': 'frequency-one-time', //radio id: frequency-monthly or frequency-one-time
                              'buttonType': 'monthly-modal-no', //button id: monthly-modal-yes or monthly-modal-no
                              'updatedAmount': '$'+Math.round(checkedInput) //donation amount selected from monthly-modal-amount
                          });
                        });
                      
                        var wsIsActive = false; //assume that WS doesn't exist, to start 
                        
                        //If this bit of WS code exists, then assume WS is active 
                        if ($('#windowshade-promo-processed').length || $('#monthly-modal-promo-processed').length) { //check if windowshade code exists on this form
                            wsIsActive = true;
                        }
                        
                        //Now test to see if Willow has turned WS off
                        if (typeof WillowModule !== "undefined") {
                            if (typeof WillowModule.thisPage.showMonthlyWindowshade !== "undefined" && WillowModule.thisPage.showMonthlyWindowshade == false) {
                                wsIsActive = false;
                            }
                        }                        
                                   
                        //If WS is active, we need to check to make sure it has appeared, before counting this step as complete
                        if (wsIsActive) {
                            if ($('#windowshade-promo-processed').val() == '1' ||
                                  $('#monthly-modal-promo-processed').val() == '1') {
                                //WS has been processed. If we've already submitted, return. If not, proceed with event tracking.
                                if(hasSubmittedForm) return;
                                
                                if ($('#windowshade_monthly_donor_radio').is(":checked")) {
                                    makeItMonthlySelectedValue = "Yes - Upsell";

                                } else {
                                    makeItMonthlySelectedValue = "No - Upsell"; 
                                }
                            //If user selected checkbox manually, WS-processed marker will stay set to 0, but form will submit 
                            } else if (
                              ($('#windowshade-promo-processed').val() == '0' || 
                                $('#monthly-modal-promo-processed').val() == '0') && 
                                ($("#level_standardauto_repeatname").is(":checked"))) {
                                if(hasSubmittedForm) return;                
                                
                                makeItMonthlySelectedValue = "Yes - Checkbox";                      
                            } else {
                                //WS hasn't been processed yet, so return without doing anything
                                return;                        
                            }
                        } else {
                            //there's no upsell WS on this form
                            if(hasSubmittedForm) return;                
                            
                            
                            if ($("#level_standardauto_repeatname").length) {  //check for existence of checkbox                  
                                if ($("#level_standardauto_repeatname").is(":checked")) {
                                    makeItMonthlySelectedValue = "Yes - Checkbox";                    
                                } else {
                                    makeItMonthlySelectedValue = "No - Checkbox"; 
                                }
                            } else { //checkbox does not exist
                                makeItMonthlySelectedValue = "N/A - No monthly checkbox on form";
                            }
                        }

                        console.log(makeItMonthlySelectedValue);
                        
                        dataLayer.push({
                            'event': 'checkout',
                            'makeItMonthlySelected': makeItMonthlySelectedValue,  // whether or not user chose to repeat this gift each month                    
                            'ecommerce': {
                                'checkout': {
                                    'actionField': {'step': 4},
                                    'products': [{
                                        'name': formProperties.id, // Name or ID is required.
                                        'id': '', // The ID of the product, must be consistent
                                        'category': formProperties.type,
                                        'quantity': 1
                                    }]
                                }
                            }
                        });

                        hasSubmittedForm = true;
                    });

                              'buttonType': 'monthly-modal-yes', //button id: monthly-modal-yes or monthly-modal-no
                              'updatedAmount': monthlyPromoAmount //donation amount selected from monthly-modal-amount
                          });
                    }
                  });*/



                                        

                    
                });
            })(jQuery);
        ]]
