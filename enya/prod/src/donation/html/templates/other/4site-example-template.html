<!DOCTYPE HTML>

<html>

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${page~title}</title>
  <!-- Address bar color in mobile browser -->
  <meta name="theme-color" content="#ff6600" />


  <!-- Global Site Tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=${blueprint~gatrackingid}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());

    gtag('config', '${blueprint~gatrackingid}');
  </script>
</head>

<body>

  <!-- Start 4Site Template Body Wrapper -->
  <div id="main-content-wrapper">
    <div id="main-content">
      <div id="main-content-inner">

        <p><img alt="" class="logo" data-ratio-lock="true" data-unit="px" src="${blueprint~headerlogo}"
            width="${blueprint~headerlogowidth}" /></p>
  <!-- End Template Header Block -->

  <!-- Begin Template Footer Block -->
  
      </div>
    </div>


  </div>
  <!-- End 4Site Template Body Wrapper -->

  <!-- Start 4Site Template CSS -->
  <link rel="stylesheet"
    href="https://aaf1a18515da0e792f78-c27fdabe952dfc357fe25ebf5c8897ee.ssl.cf5.rackcdn.com/1874/4Site-en-theme.css?v=1507218015000">
  <!-- End 4Site Template CSS -->

  <!-- Start 4Site Template JS -->
  <script
    src="https://aaf1a18515da0e792f78-c27fdabe952dfc357fe25ebf5c8897ee.ssl.cf5.rackcdn.com/1913/4Site-en-page-scripts-v2.js?v=1542216685000">
  </script>
  <!-- End 4Site Template JS -->

  <style>
    @media (min-width: 41.25em) {
      html {
        /* Background pattern from Subtle Patterns */
        background: url("${blueprint~backgroundimg}") repeat center center fixed;
      }
    }

    body {
      background-color: initial;
    }

    body {
      background-color: initial;
    }

    .en__mandatory label.en__field__label:not(.en__field__label--item)::after {
      content: "*";
      color: red;
    }

    /** STYLES and COLORS **/
    #main-content .en__submit button {
      background: $ {
        blueprint~buttoncolor
      }

      ;
    }

    #main-content {
      font-family: $ {
        blueprint~primaryfont
      }

      ;

      color:$ {
        blueprint~primarycolor
      }

      ;
    }

    #main-content h1 {
      font-family: $ {
        blueprint~heading1font
      }

      ;

      color:$ {
        blueprint~heading1color
      }

      ;
    }

    #main-content h2 {
      font-family:$ {
        blueprint~heading2font
      }

      ;

      color:$ {
        blueprint~heading2color
      }

      ;
    }

    #main-content h3 {
      font-family: $ {
        blueprint~heading3font
      }

      ;

      color:$ {
        blueprint~heading3color
      }

      ;
    }

    #main-content a {
      color:$ {
        blueprint~linkcolor
      }

      ;
    }

    #main-content-inner .en__field__input--radio:checked+.en__field__label:before,
    #main-content-inner .en__field__input--checkbox:checked+.en__field__label:before {
      border-color: $ {
        blueprint~buttoncolor
      }

      ;

      background-color: $ {
        blueprint~buttoncolor
      }

      ;
    }

    #main-content-wrapper {
      max-width: 57.25rem;
    }

    strong {
      font-weight: bold !important;
    }

    /** Hide Fix **/
    .en__hidden {
      display: none !important;
    }

    /** Fixes the column issue **/
    #main-content .en__component--advrow .en__component--column {
      min-width: inherit !important;
    }

    #main-content .en__component--row.en__component--advrow {
      display: flex;
      flex-wrap: wrap;
    }

    #main-content .en__component--column {
      min-width: inherit !important;
    }

    /* Fix for radio with other box - doesn't hide properly */
    /* Added 02/07/2020 CHP */
    .en__field__item.en__field__item--other.en__field__item--hidden {
      display: none !important;
    }
  </style>


</body>

</html>
